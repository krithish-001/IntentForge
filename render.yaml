services:
  - type: web
    name: intentforge-srp
    runtime: docker
    dockerfilePath: ./SRP/Dockerfile
    dockerContext: ./SRP
    plan: free
    disk:
      name: chroma-db
      mountPath: /app/db_storage
      sizeGB: 1

  - type: web
    name: intentforge-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: MONGODB_URI
        sync: false
      - key: ES_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SRP_API_URL
        sync: false